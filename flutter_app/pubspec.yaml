name: vigilancia_bot_config
description: Alerta Vecinal — Sistema de vigilancia inteligente con alertas en tiempo real.
version: 2.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Fonts
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0

  # Navigation & State
  provider: ^6.1.2

  # Storage & DB
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.4
  path: ^1.9.0
  path_provider: ^2.1.3
  shared_preferences: ^2.5.5

  # Security & Encryption
  encrypt: ^5.0.3
  crypto: ^3.0.5

  # Email (Gmail SMTP)
  mailer: ^6.1.2

  # Utilities
  url_launcher: ^6.2.2
  intl: ^0.19.0
  uuid: ^4.5.0

  # Networking — Servidor IA (WebSocket)
  web_socket_channel: ^3.0.1


  # Desktop window management
  window_manager: ^0.3.9
  flutter_svg: ^2.3.0
  file_selector: ^1.1.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
